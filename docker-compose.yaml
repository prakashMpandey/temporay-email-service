services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
  
  backend:
    build: ./tempmail
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
  
  frontend:
    build: 
      context: ./frontend
      args:
         VITE_API_URL: ${VITE_API_URL}
    ports:
      - "3000:80"
    depends_on:
      - db
      - backend

  celery-worker:
    build: ./tempmail
    command: celery -A tempmail worker -l info
    volumes:
      - .:/usr/src/app/
    env_file:
      - .env
    depends_on:
      - redis
  

  celery-beat:
    build: ./tempmail
    command: celery -A tempmail beat -l info
    env_file:
      - .env
    depends_on:
      - redis

  smtp_server:
    build: ./tempmail
    working_dir: /usr/src/app  # Jo Celery worker use kar raha hai wahi yahan rakho
    command: python manage.py smtp
    volumes:
      - ./tempmail:/usr/src/app  # '.' ki jagah './tempmail' karo
    ports:
      - "1025:1025"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local


